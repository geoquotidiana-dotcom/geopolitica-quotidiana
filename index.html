<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Geopolitica Quotidiana — Analisi imparziale di geopolitica</title>
  <meta name="description" content="Analisi imparziale di geopolitica con focus su Europa e Americhe. Ogni giorno una nuova prospettiva.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;0,700;1,400;1,600&family=Work+Sans:wght@300;400;500;600;700&family=Space+Mono&display=swap" rel="stylesheet">
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{
      --coral:#ff6463;--blue:#1d00ff;--rose:#d8a09f;
      --black:#0b0b0b;--dark:#141414;--white:#fff;--off:#f7f5f2;
      --gray-90:#111;--gray-70:#3a3a3a;--gray-50:#666;--gray-30:#999;--gray-10:#e4ddd6;
      --display:'Cormorant Garamond',Georgia,serif;
      --body:'Work Sans',sans-serif;
      --mono:'Space Mono',monospace;
    }
    html{scroll-behavior:smooth}
    body{font-family:var(--body);background:var(--white);color:var(--gray-90);-webkit-font-smoothing:antialiased;overflow-x:hidden}

    /* ANIMATIONS */
    @keyframes fadeUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
    @keyframes fadeIn{from{opacity:0}to{opacity:1}}
    @keyframes ticker{from{transform:translateX(0)}to{transform:translateX(-50%)}}
    @keyframes spin{to{transform:rotate(360deg)}}
    @keyframes pulse{0%,100%{opacity:.4}50%{opacity:1}}
    .fade-up{animation:fadeUp .5s cubic-bezier(.16,1,.3,1) both}
    .fade-in{animation:fadeIn .35s ease both}

    /* TICKER */
    .ticker-wrap{background:var(--coral);overflow:hidden;white-space:nowrap;height:30px;display:flex;align-items:center}
    .ticker-inner{display:inline-flex;animation:ticker 28s linear infinite}
    .ticker-inner:hover{animation-play-state:paused}
    .ticker-item{font-family:var(--mono);font-size:10px;color:#fff;padding:0 32px;display:flex;align-items:center;gap:10px}
    .ticker-dot{width:4px;height:4px;border-radius:50%;background:rgba(255,255,255,.5);flex-shrink:0}

    /* HEADER */
    .site-header{position:sticky;top:0;z-index:200;background:var(--black);border-bottom:2.5px solid var(--coral)}
    .header-band{display:flex;align-items:center;justify-content:space-between;padding:14px 32px;border-bottom:1px solid rgba(255,255,255,.06)}
    .site-logo{font-family:var(--display);font-size:23px;font-weight:700;letter-spacing:-.4px;color:var(--white);cursor:pointer;user-select:none;transition:opacity .15s}
    .site-logo:hover{opacity:.8}
    .site-logo em{font-style:normal;color:var(--coral)}
    .header-right{display:flex;align-items:center;gap:20px}
    .header-date{font-family:var(--mono);font-size:10px;color:rgba(255,255,255,.3);letter-spacing:.5px;text-transform:uppercase}
    .header-nav{display:flex;align-items:stretch;padding:0 20px;overflow-x:auto;scrollbar-width:none}
    .header-nav::-webkit-scrollbar{display:none}
    .nav-pill{font-family:var(--mono);font-size:10px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;background:none;border:none;color:rgba(255,255,255,.35);padding:10px 16px;cursor:pointer;border-bottom:2px solid transparent;transition:color .15s,border-color .15s;white-space:nowrap}
    .nav-pill:hover{color:rgba(255,255,255,.7)}
    .nav-pill.active{color:var(--white);border-bottom-color:var(--coral)}
    .nav-pill.active.cat-europa{border-bottom-color:var(--blue);color:#8888ff}
    .nav-pill.active.cat-americhe{border-bottom-color:var(--coral);color:#ff9494}

    /* CAT TAGS */
    .cat-tag{display:inline-flex;align-items:center;padding:4px 10px;border-radius:3px;font-family:var(--mono);font-size:9px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;width:fit-content}
    .cat-tag.europa{background:var(--blue);color:#fff}
    .cat-tag.americhe{background:var(--coral);color:#fff}

    /* HERO */
    .hero{position:relative;height:520px;overflow:hidden;background:var(--black);cursor:pointer}
    .hero-img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;transition:transform 6s ease}
    .hero:hover .hero-img{transform:scale(1.03)}
    .hero-overlay{position:absolute;inset:0;background:linear-gradient(to top,rgba(0,0,0,.92) 0%,rgba(0,0,0,.55) 45%,rgba(0,0,0,.12) 100%)}
    .hero-content{position:absolute;bottom:0;left:0;right:0;padding:36px 48px 52px;max-width:820px}
    .hero-content .cat-tag{margin-bottom:14px}
    .hero-title{font-family:var(--display);font-size:clamp(26px,3.2vw,44px);font-weight:700;line-height:1.08;letter-spacing:-.6px;color:var(--white);margin-bottom:14px;text-shadow:0 2px 8px rgba(0,0,0,.4)}
    .hero-deck{font-size:15px;line-height:1.6;color:rgba(255,255,255,.7);margin-bottom:20px;max-width:600px}
    .hero-meta{font-family:var(--mono);font-size:10px;color:rgba(255,255,255,.4);display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin-bottom:20px}
    .meta-dot{width:3px;height:3px;border-radius:50%;background:rgba(255,255,255,.2)}
    .read-btn{display:inline-flex;align-items:center;gap:8px;padding:12px 24px;background:var(--coral);color:#fff;font-family:var(--body);font-size:12px;font-weight:700;border:none;border-radius:5px;cursor:pointer;transition:background .2s,transform .15s;letter-spacing:.3px}
    .read-btn:hover{background:#e85352;transform:translateY(-1px)}
    .read-btn svg{flex-shrink:0;transition:transform .2s}
    .read-btn:hover svg{transform:translateX(3px)}
    .hero-img-fallback{position:absolute;inset:0;background:linear-gradient(145deg,#06051a 0%,#1d00ff 100%)}
    .hero-img-fallback.americhe{background:linear-gradient(145deg,#1a0606 0%,#ff6463 100%)}

    /* SECONDARY ROW */
    .secondary-row{display:grid;grid-template-columns:1fr 1fr;border-bottom:1px solid var(--gray-10)}
    .sec-card{position:relative;overflow:hidden;height:300px;cursor:pointer;border-right:1px solid var(--gray-10)}
    .sec-card:last-child{border-right:none}
    .sec-img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;transition:transform .5s ease}
    .sec-card:hover .sec-img{transform:scale(1.04)}
    .sec-overlay{position:absolute;inset:0;background:linear-gradient(to top,rgba(0,0,0,.85) 0%,rgba(0,0,0,.3) 60%,transparent 100%)}
    .sec-content{position:absolute;bottom:0;left:0;right:0;padding:20px 24px}
    .sec-content .cat-tag{margin-bottom:10px}
    .sec-title{font-family:var(--display);font-size:clamp(16px,1.6vw,21px);font-weight:700;line-height:1.18;letter-spacing:-.2px;color:var(--white);margin-bottom:8px;text-shadow:0 1px 4px rgba(0,0,0,.5);transition:color .15s}
    .sec-card:hover .sec-title{color:var(--rose)}
    .sec-meta{font-family:var(--mono);font-size:9px;color:rgba(255,255,255,.4)}
    .sec-img-fallback{position:absolute;inset:0}
    .sec-img-fallback.europa{background:linear-gradient(145deg,#06051a,#1d00ff)}
    .sec-img-fallback.americhe{background:linear-gradient(145deg,#1a0606,#ff6463)}

    /* SECTION DIVIDER */
    .section-divider{display:flex;align-items:center;gap:14px;padding:20px 32px 0}
    .divider-label{font-family:var(--mono);font-size:9px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--gray-30);white-space:nowrap}
    .divider-line{flex:1;height:1px;background:var(--gray-10)}

    /* GRID */
    .news-grid{display:grid;grid-template-columns:repeat(3,1fr);border-top:1px solid var(--gray-10)}
    .news-card{border-right:1px solid var(--gray-10);border-bottom:1px solid var(--gray-10);cursor:pointer;overflow:hidden;transition:background .2s;animation:fadeUp .45s cubic-bezier(.16,1,.3,1) both}
    .news-card:nth-child(3n){border-right:none}
    .news-card:hover{background:var(--off)}
    .news-card:hover .card-title{color:var(--coral)}
    .card-img-wrap{height:190px;position:relative;overflow:hidden;background:var(--black)}
    .card-img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;transition:transform .5s ease}
    .news-card:hover .card-img{transform:scale(1.05)}
    .card-img-overlay{position:absolute;inset:0;background:linear-gradient(to top,rgba(0,0,0,.6) 0%,transparent 55%)}
    .card-tag-img{position:absolute;bottom:12px;left:14px}
    .card-bg-fallback{position:absolute;inset:0}
    .card-bg-fallback.europa{background:linear-gradient(140deg,#06051a,#1d00ff)}
    .card-bg-fallback.americhe{background:linear-gradient(140deg,#1a0606,#ff6463)}
    .card-body{padding:18px 20px 22px}
    .card-title{font-family:var(--display);font-size:18px;font-weight:700;line-height:1.2;letter-spacing:-.2px;color:var(--gray-90);margin-bottom:8px;transition:color .15s}
    .card-deck{font-size:12.5px;line-height:1.6;color:var(--gray-50);margin-bottom:12px}
    .card-meta{font-family:var(--mono);font-size:10px;color:var(--gray-30)}

    /* EMPTY STATE */
    .empty-state{text-align:center;padding:80px 24px;color:var(--gray-30);grid-column:1/-1}
    .empty-icon{font-size:36px;margin-bottom:12px}

    /* ARTICLE VIEW */
    #article-view{display:none;animation:fadeIn .3s ease}
    .art-progress{position:fixed;top:0;left:0;height:3px;background:var(--coral);z-index:9999;width:0%;transition:width .1s linear}
    .art-hero{position:relative;height:420px;overflow:hidden;background:var(--black)}
    .art-hero-img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;opacity:.7}
    .art-hero-overlay{position:absolute;inset:0;background:linear-gradient(to top,rgba(0,0,0,.88) 0%,rgba(0,0,0,.4) 60%,rgba(0,0,0,.15) 100%)}
    .art-hero-content{position:absolute;bottom:0;left:0;right:0;padding:32px 32px 36px}
    .art-hero-inner{max-width:740px;margin:0 auto}
    .art-hero-inner .cat-tag{margin-bottom:14px}
    .back-btn{display:inline-flex;align-items:center;gap:7px;background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.15);color:rgba(255,255,255,.7);font-family:var(--mono);font-size:9px;letter-spacing:1px;text-transform:uppercase;cursor:pointer;padding:7px 14px;border-radius:4px;margin-bottom:24px;transition:background .15s,color .15s;backdrop-filter:blur(4px)}
    .back-btn:hover{background:rgba(255,255,255,.18);color:#fff}
    .art-headline{font-family:var(--display);font-size:clamp(24px,3.5vw,42px);font-weight:700;line-height:1.08;letter-spacing:-.6px;color:var(--white);margin-bottom:14px;text-shadow:0 2px 8px rgba(0,0,0,.5)}
    .art-deck{font-size:15px;line-height:1.65;color:rgba(255,255,255,.6);margin-bottom:18px}
    .art-meta-bar{font-family:var(--mono);font-size:10px;color:rgba(255,255,255,.3);display:flex;align-items:center;gap:10px;flex-wrap:wrap}
    .art-meta-dot{width:3px;height:3px;border-radius:50%;background:rgba(255,255,255,.15)}
    .art-bg-fallback{position:absolute;inset:0}
    .art-bg-fallback.europa{background:linear-gradient(145deg,#06051a,#1d00ff)}
    .art-bg-fallback.americhe{background:linear-gradient(145deg,#1a0606,#ff6463)}
    .art-body-wrap{max-width:700px;margin:0 auto;padding:44px 28px 88px}
    .art-body{font-size:16.5px;line-height:1.78;color:#333}
    .art-body p{margin-bottom:22px}
    .art-body h2{font-family:var(--display);font-size:26px;font-weight:700;letter-spacing:-.3px;color:var(--gray-90);margin:40px 0 14px;line-height:1.2}
    .art-body blockquote{border-left:3px solid var(--coral);padding:10px 22px;margin:32px 0;font-family:var(--display);font-size:21px;font-style:italic;color:var(--gray-50);line-height:1.55}
    .art-body strong{color:var(--gray-90);font-weight:600}
    .art-end-rule{width:40px;height:2px;background:var(--coral);margin:44px auto 0}
    .art-related{max-width:700px;margin:0 auto;padding:0 28px 60px;border-top:1px solid var(--gray-10)}
    .art-related-label{font-family:var(--mono);font-size:9px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--gray-30);padding:24px 0 16px}
    .art-related-grid{display:grid;grid-template-columns:1fr 1fr;gap:1px;background:var(--gray-10)}
    .art-related-card{background:var(--white);padding:16px;cursor:pointer;transition:background .15s}
    .art-related-card:hover{background:var(--off)}
    .arc-title{font-family:var(--display);font-size:15px;font-weight:700;line-height:1.25;color:var(--gray-90);margin:8px 0 6px;transition:color .15s}
    .art-related-card:hover .arc-title{color:var(--coral)}
    .arc-meta{font-family:var(--mono);font-size:9px;color:var(--gray-30)}

    /* BACK TO TOP */
    .back-top{position:fixed;bottom:28px;right:28px;width:40px;height:40px;background:var(--black);color:#fff;border:none;border-radius:50%;cursor:pointer;display:none;align-items:center;justify-content:center;z-index:100;transition:background .15s,transform .15s;box-shadow:0 4px 16px rgba(0,0,0,.25)}
    .back-top:hover{background:var(--coral);transform:translateY(-2px)}
    .back-top.visible{display:flex}

    /* FOOTER */
    .site-footer{background:var(--black);padding:48px 32px;border-top:2.5px solid var(--coral);text-align:center}
    .footer-logo{font-family:var(--display);font-size:22px;font-weight:700;color:var(--white);margin-bottom:8px}
    .footer-logo em{font-style:normal;color:var(--coral)}
    .footer-tagline{font-family:var(--mono);font-size:10px;letter-spacing:1px;color:rgba(255,255,255,.28);text-transform:uppercase;margin-bottom:20px}
    .footer-chips{display:flex;justify-content:center;gap:8px;flex-wrap:wrap}
    .footer-chip{padding:4px 11px;border:1px solid rgba(255,255,255,.1);border-radius:3px;font-family:var(--mono);font-size:9px;letter-spacing:1px;text-transform:uppercase;color:rgba(255,255,255,.25)}

    

    /* RESPONSIVE */
    @media(max-width:900px){
      .news-grid{grid-template-columns:repeat(2,1fr)}
      .news-card:nth-child(3n){border-right:1px solid var(--gray-10)}
      .news-card:nth-child(2n){border-right:none}
    }
    @media(max-width:680px){
      .secondary-row{grid-template-columns:1fr}
      .sec-card{border-right:none;border-bottom:1px solid var(--gray-10)}
      .news-grid{grid-template-columns:1fr}
      .news-card{border-right:none!important}
      .hero{height:440px}
      .hero-content{padding:24px 24px 44px}
      .header-band{padding:12px 20px}
      .site-logo{font-size:19px}
      .art-hero{height:340px}
    }
    @media(max-width:480px){
      .art-related-grid{grid-template-columns:1fr}
    }
  </style>
</head>

<script>
// ═══════════════════════════════════════
//  IMAGES

const PX = id => `https://images.pexels.com/photos/${id}/pexels-photo-${id}.jpeg?auto=compress&cs=tinysrgb&w=1260&q=80`;

// ═══════════════════════════════════════
//  ARTICLES
// ═══════════════════════════════════════
let ARTICLES = [
  {
    id: 1,
    title: `La nuova Europa della difesa: riarmo collettivo tra ambizioni e fratture`,
    deck: `Dopo decenni di dipendenza dalla NATO, i paesi europei accelerano sull'autonomia militare. Le divergenze su budget, comando e industria rimangono profonde.`,
    category: 'europa',
    date: '5 giugno 2026',
    readTime: 5,
    featured: true,
    image: PX(434673),
    body: `<p>L'Europa sta attraversando una trasformazione silenziosa ma radicale nel modo in cui pensa alla propria sicurezza. Dopo anni di retorica sull'autonomia strategica, la pressione geopolitica degli ultimi anni ha trasformato le parole in misure concrete: aumenti record dei budget per la difesa, nuovi framework industriali comuni, e un dibattito sempre più serrato su chi dovrebbe comandare in caso di crisi.</p><h2>Il salto di paradigma</h2><p>Il punto di svolta non è stato un singolo evento, ma l'accumulo di crisi che ha reso evidente quanto fragile fosse il vecchio ordine. La dipendenza energetica dalla Russia, le tensioni commerciali con gli Stati Uniti, la guerra ai confini dell'Unione: tutto ha contribuito a creare un consenso, fragile ma reale.</p><blockquote>"La sovranità europea non si declama, si finanzia." — una formula che circola nei corridoi di Bruxelles.</blockquote><p>I dati parlano chiaro: la maggioranza dei paesi UE ha raggiunto o superato la soglia del 2% del PIL destinato alla difesa richiesta dalla NATO. Germania, Polonia e Paesi Baltici guidano la classifica.</p><h2>Le fratture che restano</h2><p>I numeri nascondono tensioni strutturali che nessun vertice riesce a risolvere. La prima è industriale: ogni paese vuole che i propri soldi finanzino la propria industria. La frammentazione della difesa europea è ancora enorme rispetto a quella americana.</p><p>La seconda tensione è politica: chi comanda? La Francia insiste su una leadership europea autonoma dalla NATO. I paesi dell'Europa orientale preferiscono la garanzia americana dell'Articolo 5. La Germania oscilla tra le due posizioni.</p><h2>Cosa aspettarsi</h2><p>Nei prossimi anni il banco di prova sarà la concretezza: riusciranno i paesi europei a costruire una catena di comando funzionante? Le risposte determineranno se l'autonomia strategica europea rimarrà uno slogan o diventerà realtà.</p>`
  },
  {
    id: 2,
    title: `Washington e Città del Messico: commercio, migrazione e la diplomazia della pressione`,
    deck: `L'amministrazione statunitense rilancia le pressioni sul confine sud mentre i negoziati commerciali entrano nella fase più delicata. Tariffe e flussi migratori intrecciano due dossier esplosivi.`,
    category: 'americhe',
    date: '4 giugno 2026',
    readTime: 4,

no. La loro logica è semplice: le capacità europee in costruzione non compensano, nel breve periodo, il ritiro di un deterrente operativo già presente.</p><p>La Francia, al contrario, legge il ritiro americano come un'opportunità storica per accelerare sull'autonomia strategica europea. La Germania, come sempre, si muove con cautela. Il risultato è una NATO più ricca di risorse proprie ma più divisa sulle priorità. Una tensione che il segretario Rubio ha cercato di gestire al vertice di Helsingborg, senza però scioglierla.</p><h2>Il nodo della credibilità</h2><p>La credibilità di una deterrenza dipende dalla percezione del potenziale avversario. La Russia misura con attenzione i segnali che arrivano dall'Occidente. Il taglio delle brigate americane, letto insieme alla lentezza dell'integrazione industriale europea, potrebbe essere interpretato come un indebolimento della risposta collettiva. Non è detto che lo sia. Ma la percezione conta quanto la realtà, in geopolitica.</p>`

function catLabel(cat){ return cat === 'europa' ? '🇪🇺 Europa' : '🌎 Americhe' }
function catTag(cat){ return `<div class="cat-tag ${cat}">${catLabel(cat)}</div>` }

// ═══════════════════════════════════════
//  NAVIGATION

function setCategory(cat, btn){
  activeCategory = cat;
  document.querySelectorAll('.nav-pill').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderHome();
}

function goHome(){
  document.getElementById('article-view').style.display = 'none';
  document.getElementById('home-view').style.display = 'block';
  window.scrollTo(0,0);
  window.onscroll = scrollHandler;
}

function scrollHandler(){
  const bt = document.getElementById('back-top');
  bt.classList.toggle('visible', window.scrollY > 400);
}

// ═══════════════════════════════════════
//  RENDER HOME
// ═══════════════════════════════════════
function renderHome(){
  const filtered = activeCategory === 'all' ? ARTICLES : ARTICLES.filter(a => a.category === activeCategory);
  const featured = filtered.find(a => a.featured) || filtered[0] || null;
  const rest = featured ? filtered.filter(a => a.id !== featured.id) : filtered;
  const secondary = rest.slice(0,2);
  const grid = rest.slice(2);

  // HERO
  const heroEl = document.getElementById('hero-section');
  if(featured){
    heroEl.style.display = '';
    heroEl.innerHTML = `
      <div class="hero fade-in" onclick="goToArticle(${featured.id})">
        ${featured.image ? '' : `<div class="hero-img-fallback${featured.category==='americhe'?' americhe':''}"></div>`}

        <div class="hero-overlay"></div>
        <div class="hero-content">
          ${catTag(featured.category)}
          <h2 class="hero-title">${featured.title}</h2>
          <p class="hero-deck">${featured.deck}</p>
          <div class="hero-meta">
            <span>${featured.date}</span>
            <div class="meta-dot"></div>
            <span>${featured.readTime} min di lettura</span>
          </div>
          <button class="read-btn" onclick="event.stopPropagation();goToArticle(${featured.id})">
            Leggi l'analisi
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
          </button>
        </div>
      </div>`;
  } else { heroEl.style.display = 'none'; }

  // SECONDARY
  const secEl = document.getElementById('secondary-section');
  if(secondary.length > 0){
    secEl.style.display = '';
    secEl.innerHTML = `<div class="secondary-row">
      ${secondary.map(a => `
        <div class="sec-card" onclick="goToArticle(${a.id})">
          ${a.image ? '' : `<div class="sec-img-fallback ${a.category}"></div>`}
          ${a.image ? `<img class="sec-img" src="${a.image}" alt="${a.title}" loading="lazy" onerror="this.style.display='none'">` : ''}
          <div class="sec-overlay"></div>
          <div class="sec-content">
            ${catTag(a.category)}
            <div class="sec-title">${a.title}</div>
            <div class="sec-meta">${a.date} · ${a.readTime} min</div>
          </div>
        </div>`).join('')}
    </div>`;
  } else { secEl.style.display = 'none'; }

  // SECTION DIVIDER
  const divEl = document.getElementById('sec-divider');
  divEl.style.display = grid.length ? '' : 'none';

  // GRID
  const gridEl = document.getElementById('news-grid');
  if(filtered.length === 0){
    gridEl.innerHTML = `<div class="empty-state"><div class="empty-icon">🌍</div><div>Nessun articolo disponibile in questa categoria.</div></div>`;
    return;
  }
  gridEl.innerHTML = grid.map((a, i) => `
    <div class="news-card fade-up" style="animation-delay:${i*55}ms" onclick="goToArticle(${a.id})">
      <div class="card-img-wrap">
        ${a.image ? '' : `<div class="card-bg-fallback ${a.category}"></div>`}
        ${a.image ? `<img class="card-img" src="${a.image}" alt="${a.title}" loading="lazy" onerror="this.previousElementSibling||this.insertAdjacentHTML('beforebegin','<div class=\\"card-bg-fallback ${a.category}\\"></div>');this.style.display='none'">` : ''}
        <div class="card-img-overlay"></div>
        <div class="card-tag-img">${catTag(a.category)}</div>
      </div>
      <div class="card-body">
        <div class="card-title">${a.title}</div>
        <p class="card-deck">${a.deck}</p>
        <div class="card-meta">${a.date} · ${a.readTime} min</div>
      </div>
    </div>`).join('');
}

// ═══════════════════════════════════════
//  ARTICLE VIEW
// ═══════════════════════════════════════
function goToArticle(id){
  const a = ARTICLES.find(x => x.id === id);
  if(!a) return;

  // Header
  document.getElementById('art-bg-fallback').className = `art-bg-fallback ${a.category}`;
  const artImg = document.getElementById('art-img');
  artImg.src = a.image || '';
  artImg.style.display = a.image ? '' : 'none';
  document.getElementById('art-tag').innerHTML = catTag(a.category);
  document.getElementById('art-headline').textContent = a.title;
  document.getElementById('art-deck').textContent = a.deck;
  document.getElementById('art-meta').innerHTML = `
    <span>${a.date}</span>
    <div class="art-meta-dot"></div>
    <span>${a.readTime} min di lettura</span>`;

  // Body
  document.getElementById('art-body').innerHTML = a.body;

  // Related
  const related = ARTICLES.filter(x => x.id !== id).slice(0,4);
  document.getElementById('art-related').innerHTML = related.map(r => `
    <div class="art-related-card" onclick="goToArticle(${r.id})">
      ${catTag(r.category)}
      <div class="arc-title">${r.title}</div>
      <div class="arc-meta">${r.date} · ${r.readTime} min</div>
    </div>`).join('');

  // Show view
  document.getElementById('home-view').style.display = 'none';
  document.getElementById('article-view').style.display = 'block';
  window.scrollTo(0,0);

  // Reading progress
  const bar = document.getElementById('art-progress');
  bar.style.width = '0%';
  window.onscroll = () => {
    const av = document.getElementById('article-view');
    const pct = Math.min(100, (window.scrollY / (av.scrollHeight - window.innerHeight)) * 100);
    bar.style.width = pct + '%';
    document.getElementById('back-top').classList.toggle('visible', window.scrollY > 400);
  };
}

// ═══════════════════════════════════════
//  INIT
// ═══════════════════════════════════════
document.addEventListener('DOMContentLoaded', async () => {
  // Load external articles if available (GitHub Pages)
  try {
    const res = await fetch('./articles.js');
    if(res.ok){ const loaded = await res.json(); if(loaded?.length) ARTICLES = loaded; }
  } catch {}

  // Date
  document.getElementById('header-date').textContent =
    new Date().toLocaleDateString('it-IT', {weekday:'long', year:'numeric', month:'long', day:'numeric'});

  // Ticker
  const items = [...TICKER_ITEMS, ...TICKER_ITEMS];
  document.getElementById('ticker-bar').innerHTML =
    `<div class="ticker-inner">${items.map(t => `<span class="ticker-item"><span class="ticker-dot"></span>${t}</span>`).join('')}</div>`;

  // Scroll handler
  window.addEventListener('scroll', scrollHandler);

  renderHome();
});
</script>
